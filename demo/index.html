<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoB Parser Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #09090b; /* zinc-950 */
      --text-color: #d4d4d8; /* zinc-300 */
      --text-header: #f4f4f5; /* zinc-100 */
      --text-muted: #71717a; /* zinc-500 */
      --border-color: #27272a; /* zinc-800 */
      --border-hover: #3f3f46; /* zinc-700 */
      --accent-color: #e5c158; /* Gold accent */
      --accent-light: #f3ffca; /* Juddscript lime accent */
      --success-color: #10b981;
      --error-color: #f87171;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.875rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text-header);
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .version-tag {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--text-muted);
    }

    /* Terminal Box styling */
    .terminal-box {
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      border-bottom: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Form Elements */
    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .form-row {
        grid-template-columns: 1fr auto;
      }
    }

    .input-field {
      width: 100%;
      background-color: #0c0c0e;
      border: 1px solid var(--border-color);
      color: var(--text-header);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .input-field:focus {
      border-color: var(--border-hover);
    }

    textarea.input-field {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      background-color: #0c0c0e;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--border-hover);
      color: var(--accent-light);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Actions row */
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* Output Editor Area */
    .editor-wrapper {
      position: relative;
    }

    .xml-textarea {
      width: 100%;
      height: 380px;
      background-color: #050507;
      border: 1px solid var(--border-color);
      color: #92a1b9;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 1rem;
      line-height: 1.5;
      outline: none;
      resize: vertical;
    }

    .xml-textarea:focus {
      border-color: var(--border-hover);
    }

    /* Console / Logs Box */
    .console-stdout {
      background-color: #050507;
      border: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      max-height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .console-line {
      display: flex;
      gap: 8px;
    }

    .console-prompt {
      color: var(--text-muted);
      user-select: none;
    }

    .console-text {
      color: var(--text-color);
      word-break: break-all;
    }

    .console-text.success {
      color: var(--success-color);
    }

    .console-text.error {
      color: var(--error-color);
    }

    .console-text.info {
      color: var(--accent-color);
    }

    /* Info footer link style */
    .footer-link {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .footer-link:hover {
      color: var(--text-color);
    }

    footer {
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <header>
      <div class="title-row">
        <div>
          <h1>pob-parser-terminal</h1>
          <p class="subtitle">Path of Building (PoB) import codes & link resolver</p>
        </div>
        <div class="version-tag">v1.0.0</div>
      </div>
    </header>

    <!-- Section 1: Decode build codes & links -->
    <div class="terminal-box">
      <div class="terminal-header">
        <span>[01] decode build / link</span>
      </div>
      <div class="terminal-body">
        <div class="form-row">
          <input type="text" id="pob-url" class="input-field" placeholder="Enter pobb.in URL (e.g. https://pobb.in/E23x6r3rboyN)">
        </div>
        
        <div style="display: flex; gap: 8px; align-items: center; font-size: 0.75rem; color: var(--text-muted);">
          <input type="checkbox" id="bypass-cors" checked style="accent-color: var(--accent-light); cursor: pointer;">
          <label for="bypass-cors" style="cursor: pointer; user-select: none;">bypass CORS restriction (uses corsproxy.io - required for browser testing)</label>
        </div>
        
        <div style="text-align: center; color: var(--text-muted); font-size: 0.75rem; margin: 0.25rem 0;">- OR PASTE IMPORT CODE -</div>
        
        <div>
          <textarea id="pob-raw-code" class="input-field" placeholder="Paste raw base64 import code..."></textarea>
        </div>

        <div class="actions-row">
          <button id="btn-decode" class="btn">
            <span>execute decode</span>
          </button>
          <button id="btn-clear" class="btn">
            <span>clear inputs</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Section 2: Editor -->
    <div class="terminal-box">
      <div class="terminal-header">
        <span>[02] build xml editor</span>
        <span id="char-count" style="color: var(--text-muted);">0 bytes</span>
      </div>
      <div class="terminal-body" style="gap: 0.75rem;">
        <div class="editor-wrapper">
          <textarea id="xml-editor" class="xml-textarea" placeholder="XML document will appear here after decoding... or paste XML directly to encode it." spellcheck="false"></textarea>
        </div>
        <div class="actions-row">
          <button id="btn-reencode" class="btn" disabled>
            <span>execute re-encode</span>
          </button>
          <button id="btn-copy-code" class="btn" disabled>
            <span>copy output code</span>
          </button>
          <button id="btn-download" class="btn" disabled>
            <span>download xml</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Section 3: Stdout Logs -->
    <div class="terminal-box">
      <div class="terminal-header">
        <span>[03] console stdout</span>
      </div>
      <div id="console-logs" class="console-stdout">
        <div class="console-line">
          <span class="console-prompt">$</span>
          <span class="console-text info">pob-parser initialized. Ready for operations.</span>
        </div>
      </div>
    </div>

    <footer>
      <span>&copy; 2026 pob-parser project</span>
      <a href="https://github.com/ppoelzl/PathOfBuildingAPI" target="_blank" rel="noopener noreferrer" class="footer-link">
        poe community specs
      </a>
    </footer>

  </div>

  <!-- Load PoBParser as IIFE global bundle -->
  <script src="index.global.js"></script>
  <script>
    // Make sure index.global.js is loaded
    if (typeof PoBParser === 'undefined') {
      document.addEventListener('DOMContentLoaded', () => {
        logLine('error', 'Critical: PoBParser global bundle is missing. Please run "npm run build" in the js/ directory to generate dist/index.global.js.');
      });
    }

    // Elements
    const pobUrlInput = document.getElementById('pob-url');
    const pobRawCodeInput = document.getElementById('pob-raw-code');
    const btnDecode = document.getElementById('btn-decode');
    const btnClear = document.getElementById('btn-clear');
    const xmlEditor = document.getElementById('xml-editor');
    const btnReencode = document.getElementById('btn-reencode');
    const btnCopyCode = document.getElementById('btn-copy-code');
    const btnDownload = document.getElementById('btn-download');
    const consoleLogs = document.getElementById('console-logs');
    const charCount = document.getElementById('char-count');

    let currentEncodedCode = '';

    // Log to custom console box
    function logLine(type, text) {
      const line = document.createElement('div');
      line.className = 'console-line';
      
      const prompt = document.createElement('span');
      prompt.className = 'console-prompt';
      prompt.textContent = '$';
      
      const content = document.createElement('span');
      content.className = 'console-text ' + type;
      content.textContent = text;
      
      line.appendChild(prompt);
      line.appendChild(content);
      
      consoleLogs.appendChild(line);
      consoleLogs.scrollTop = consoleLogs.scrollHeight;
    }

    // Clear console logs
    function clearLogs() {
      consoleLogs.innerHTML = '';
    }

    // Format XML
    function formatXml(xml) {
      let formatted = '';
      let reg = /(>)(<)(\/*)/g;
      xml = xml.replace(reg, '$1\r\n$2$3');
      let pad = 0;
      xml.split('\r\n').forEach((node) => {
        let indent = 0;
        if (node.match( /.+<\/\w[^>]*>$/ )) {
          indent = 0;
        } else if (node.match( /^<\/\w/ )) {
          if (pad !== 0) {
            pad -= 1;
          }
        } else if (node.match( /^<\w([^>]*[^\/])?>$/ )) {
          indent = 1;
        } else {
          indent = 0;
        }

        let padding = '';
        for (let i = 0; i < pad; i++) {
          padding += '  ';
        }

        formatted += padding + node + '\r\n';
        pad += indent;
      });

      return formatted.trim();
    }

    // Update char counter
    xmlEditor.addEventListener('input', () => {
      const len = xmlEditor.value.length;
      charCount.textContent = len.toLocaleString() + ' bytes';
      
      // Enable re-encode if not empty
      btnReencode.disabled = len === 0;
    });

    // Execute Decode
    btnDecode.addEventListener('click', async () => {
      const urlVal = pobUrlInput.value.trim();
      const codeVal = pobRawCodeInput.value.trim();
      
      let codeToDecode = codeVal;
      btnDecode.disabled = true;

      try {
        if (urlVal) {
          logLine('info', 'parsing url: ' + urlVal);
          const parsed = PoBParser.parseUrl(urlVal);
          
          if (!parsed) {
            throw new Error('Unrecognized link platform. Supports pobb.in URLs.');
          }
          
          logLine('info', 'resolved build ID: ' + parsed.id);
          
          let targetUrl = parsed.rawUrl;
          const bypassCors = document.getElementById('bypass-cors').checked;
          const isHosted = window.location.protocol === 'http:' || window.location.protocol === 'https:';

          if (isHosted) {
            targetUrl = '/api/fetch?url=' + encodeURIComponent(targetUrl);
            logLine('info', 'fetching via local dev proxy: ' + targetUrl);
          } else if (bypassCors) {
            targetUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);
            logLine('info', 'fetching via public CORS proxy (allorigins): ' + targetUrl);
          } else {
            logLine('info', 'fetching raw payload directly: ' + targetUrl);
          }
          
          // Execute fetch
          try {
            let rawCode;
            if (isHosted || bypassCors) {
              const res = await fetch(targetUrl);
              if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
              rawCode = (await res.text()).trim();
            } else {
              rawCode = await PoBParser.fetchRawCode(urlVal);
            }
            
            pobRawCodeInput.value = rawCode;
            logLine('info', 'payload fetched successfully (' + rawCode.length + ' chars)');
            codeToDecode = rawCode;
          } catch (fetchErr) {
            throw new Error('fetch error (CORS block or network down): ' + fetchErr.message);
          }
        }

        if (!codeToDecode) {
          throw new Error('No input provided. Enter a URL or paste raw Base64 code.');
        }

        logLine('info', 'executing decompress & base64 decode...');
        const xml = await PoBParser.decode(codeToDecode);
        
        logLine('success', 'decode successful. inflating XML...');
        xmlEditor.value = formatXml(xml);
        charCount.textContent = xml.length.toLocaleString() + ' bytes';
        currentEncodedCode = codeToDecode;

        btnReencode.disabled = false;
        btnCopyCode.disabled = false;
        btnDownload.disabled = false;
        
        logLine('success', 'operations completed.');
      } catch (err) {
        logLine('error', 'Operation failed: ' + err.message);
      } finally {
        btnDecode.disabled = false;
      }
    });

    // Execute Re-encode
    btnReencode.addEventListener('click', async () => {
      const xmlVal = xmlEditor.value.trim();
      if (!xmlVal) {
        logLine('error', 're-encode error: XML buffer is empty.');
        return;
      }

      btnReencode.disabled = true;
      logLine('info', 'executing zlib deflate & base64 encode...');

      try {
        const encoded = await PoBParser.encode(xmlVal);
        pobRawCodeInput.value = encoded;
        currentEncodedCode = encoded;
        btnCopyCode.disabled = false;
        
        logLine('success', 'encode successful. size: ' + encoded.length + ' chars');
        logLine('success', 'output code set in input textbox.');
      } catch (err) {
        logLine('error', 're-encode failed: ' + err.message);
      } finally {
        btnReencode.disabled = false;
      }
    });

    // Clear Inputs
    btnClear.addEventListener('click', () => {
      pobUrlInput.value = '';
      pobRawCodeInput.value = '';
      xmlEditor.value = '';
      charCount.textContent = '0 bytes';
      btnReencode.disabled = true;
      btnCopyCode.disabled = true;
      btnDownload.disabled = true;
      currentEncodedCode = '';
      logLine('info', 'buffers and inputs cleared.');
    });

    // Copy Output
    btnCopyCode.addEventListener('click', () => {
      if (currentEncodedCode) {
        navigator.clipboard.writeText(currentEncodedCode);
        logLine('success', 'copied PoB code to clipboard.');
      }
    });

    // Download XML file
    btnDownload.addEventListener('click', () => {
      const xmlVal = xmlEditor.value;
      if (!xmlVal) return;
      
      const blob = new Blob([xmlVal], { type: 'text/xml' });
      const elem = window.document.createElement('a');
      elem.href = window.URL.createObjectURL(blob);
      elem.download = 'pob_build.xml';
      document.body.appendChild(elem);
      elem.click();
      document.body.removeChild(elem);
      logLine('success', 'download triggered for pob_build.xml');
    });
  </script>

</body>
</html>
